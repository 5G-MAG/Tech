name: Sync Project Boards
on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch:   # Allows manual run via "Actions" tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install requests
      - name: Run sync
        env:
          PROJECT_ACCESS_TOKEN: ${{ secrets.PROJECT_ACCESS_TOKEN }}
        run: python sync_projects.py
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add pages/*.md
          git commit -m "Update live roadmap data" || exit 0
          git push
