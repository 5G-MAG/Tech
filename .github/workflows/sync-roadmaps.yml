name: Sync Project Boards
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Kanban Data
        env:
          PROJECT_ACCESS_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          python - <<EOF
          import os, json, requests
          from datetime import datetime

          token = os.environ.get("PROJECT_ACCESS_TOKEN")
          headers = {"Authorization": f"Bearer {token}"}
          
          query = """
          query {
            organization(login: "5G-MAG") {
              projectV2(number: 44) {
                items(first: 100) {
                  nodes {
                    content {
                      ... on Issue { 
                        title 
                        url 
                        labels(first: 10) { nodes { name } }
                      }
                      ... on PullRequest { 
                        title 
                        url 
                        labels(first: 10) { nodes { name } }
                      }
                    }
                    fieldValues(first: 20) {
                      nodes {
                        ... on ProjectV2ItemFieldSingleSelectValue {
                          name
                          field { ... on ProjectV2FieldCommon { name } }
                        }
                      }
                    }
                  }
                }
              }
            }
          }
          """

          try:
              response = requests.post("https://api.github.com/graphql", json={"query": query}, headers=headers)
              response.raise_for_status()
              data = response.json()
              
              if "errors" in data:
                  print(f"API Error: {data['errors']}")
                  exit(1)

              nodes = data['data']['organization']['projectV2']['items']['nodes']
              all_items = []
              
              for node in nodes:
                  content = node.get('content')
                  if not content: continue
                  
                  # Get Status from Project Field
                  status = "No Status"
                  fields = node.get('fieldValues', {}).get('nodes', [])
                  for f in fields:
                      if f.get('field', {}).get('name') == 'Status':
                          status = f.get('name')
                  
                  # Get Labels from Issue/PR
                  label_nodes = content.get('labels', {}).get('nodes', [])
                  labels = [l['name'] for l in label_nodes]
                  
                  all_items.append({
                      "title": content.get('title'),
                      "url": content.get('url'),
                      "status": status,
                      "labels": labels
                  })

              if not os.path.exists('_data'): os.makedirs('_data')
              with open('_data/roadmaps.json', 'w') as f:
                  json.dump({
                      "last_updated": datetime.now().strftime("%Y-%m-%d %H:%M UTC"),
                      "all_items": all_items
                  }, f, indent=2)
              print("Successfully updated _data/roadmaps.json")
          except Exception as e:
              print(f"Error: {e}")
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/roadmaps.json
          if ! git diff --cached --quiet; then
            git commit -m "Update roadmaps data with labels"
            git push
          else
            echo "No changes to data."
          fi
