name: Sync Project Boards
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch Kanban Data
        env:
          PROJECT_ACCESS_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          python - <<EOF
          import os, json, requests
          from datetime import datetime

          # 1. Configuration: Mapping keys to View IDs for Project 44
          project_map = {
              "streaming": 6, "5gbroadcast": 7, "mbs": 8, "xr": 9,
              "volumetric": 10, "npn": 11, "net_apis": 12, "ntn": 13, "6g": 15
          }

          def fetch_github_kanban(view_id):
              # --- INSERT YOUR EXISTING GRAPHQL FETCH LOGIC HERE ---
              # It must return a list of dicts: [{"title": "...", "url": "...", "status": "..."}]
              return [] 

          data_output = {}
          for key, v_id in project_map.items():
              print(f"Syncing {key}...")
              data_output[key] = fetch_github_kanban(v_id)

          # 2. Create _data folder and save
          if not os.path.exists('_data'): os.makedirs('_data')
          timestamp = datetime.now().strftime("%Y-%m-%d %H:%M UTC")
          with open('_data/roadmaps.json', 'w') as f:
              json.dump({"last_updated": timestamp, "projects": data_output}, f, indent=2)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/roadmaps.json
          git commit -m "Update Kanban data" || exit 0
          git push
