name: Sync Project Boards
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Kanban Data
        env:
          PROJECT_ACCESS_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          python - <<EOF
          import os, json, requests
          from datetime import datetime

          token = os.environ.get("PROJECT_ACCESS_TOKEN")
          headers = {"Authorization": f"Bearer {token}"}
          
          # This query gets all items in Project 44 and their field values (Status, etc.)
          query = """
          query {
            organization(login: "5G-MAG") {
              projectV2(number: 44) {
                items(first: 100) {
                  nodes {
                    content {
                      ... on Issue { title url }
                      ... on PullRequest { title url }
                    }
                    fieldValues(first: 20) {
                      nodes {
                        ... on ProjectV2ItemFieldSingleSelectValue {
                          name
                          field { ... on ProjectV2FieldCommon { name } }
                        }
                      }
                    }
                  }
                }
              }
            }
          }
          """

          try:
              response = requests.post("https://api.github.com/graphql", json={"query": query}, headers=headers)
              response.raise_for_status()
              data = response.json()
              
              nodes = data['data']['organization']['projectV2']['items']['nodes']
              all_items = []
              
              for node in nodes:
                  content = node.get('content')
                  if not content: continue
                  
                  status = "No Status"
                  fields = node.get('fieldValues', {}).get('nodes', [])
                  for f in fields:
                      if f.get('field', {}).get('name') == 'Status':
                          status = f.get('name')
                  
                  all_items.append({
                      "title": content.get('title'),
                      "url": content.get('url'),
                      "status": status
                  })

              if not os.path.exists('_data'): os.makedirs('_data')
              with open('_data/roadmaps.json', 'w') as f:
                  json.dump({
                      "last_updated": datetime.now().strftime("%Y-%m-%d %H:%M UTC"),
                      "all_items": all_items
                  }, f, indent=2)
          except Exception as e:
              print(f"Error: {e}")
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/roadmaps.json
          git commit -m "Update roadmaps data" || exit 0
          git push
