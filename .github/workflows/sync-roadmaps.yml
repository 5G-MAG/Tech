name: Sync Project Boards
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # --- THIS IS THE MISSING PIECE ---
      - name: Install dependencies
        run: pip install requests

      - name: Fetch and Create JSON
        env:
          PROJECT_ACCESS_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          python - <<EOF
          import os, json, requests
          from datetime import datetime

          # 1. Configuration: Mapping keys to View IDs for Project 44
          project_map = {
              "streaming": 6, "5gbroadcast": 7, "mbs": 8, "xr": 9,
              "volumetric": 10, "npn": 11, "net_apis": 12, "ntn": 13, "6g": 15
          }

          def fetch_github_kanban(view_id):
              # You must replace this with your actual GraphQL or REST query logic
              # using requests.post or requests.get
              print(f"Fetching View {view_id}...")
              return [] # Return list of {"title": "...", "url": "...", "status": "..."}

          data_output = {}
          for key, v_id in project_map.items():
              data_output[key] = fetch_github_kanban(v_id)

          # 2. Ensure _data folder exists and save
          if not os.path.exists('_data'): os.makedirs('_data')
          with open('_data/roadmaps.json', 'w') as f:
              json.dump({
                  "last_updated": datetime.now().strftime("%Y-%m-%d %H:%M UTC"),
                  "projects": data_output
              }, f, indent=2)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/roadmaps.json
          git commit -m "Update roadmaps data" || exit 0
          git push
