name: Sync Project Boards
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  update-kanban:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch Kanban Data
        env:
          PROJECT_ACCESS_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          python - <<EOF
          import os, json, requests
          from datetime import datetime

          # 1. Configuration: Map your internal key to the View ID
          # All these belong to Organization Project 44
          views = {
              "streaming": 6,
              "5gbroadcast": 7,
              "mbs": 8,
              "xr": 9,
              "volumetric": 10,
              "npn": 11,
              "net_apis": 12,
              "ntn": 13,
              "6g": 15
          }

          def fetch_view_items(view_id):
              # This is where your GraphQL logic goes to fetch from Project 44, View {view_id}
              # For now, returning a placeholder structure
              return [
                  {"title": "Sample Issue", "url": "https://github.com/...", "status": "Work in Progress"},
                  {"title": "Finished Task", "url": "https://github.com/...", "status": "Completed"}
              ]

          output = {
              "last_updated": datetime.now().strftime("%Y-%m-%d %H:%M UTC"),
              "projects": {}
          }

          for key, v_id in views.items():
              print(f"Fetching View {v_id} for {key}...")
              output["projects"][key] = fetch_view_items(v_id)

          if not os.path.exists('_data'): os.makedirs('_data')
          with open('_data/kanban.json', 'w') as f:
              json.dump(output, f, indent=2)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/kanban.json
          git commit -m "Update Kanban data for all projects" || exit 0
          git push
